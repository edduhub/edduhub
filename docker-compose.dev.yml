services:
  postgres:
    image: postgres:18-alpine
    container_name: edduhub-postgres
    environment:
      POSTGRES_USER: keto
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: keto
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keto -d keto"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - edduhub-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    container_name: edduhub-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]

  minio:
    image: minio/minio:latest
    container_name: edduhub-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - edduhub-minio-data:/data

  keto:
    image: oryd/keto:latest
    container_name: edduhub-keto
    command: serve -c /etc/config/keto.yml
    environment:
      - DSN=memory
    ports:
      - "4466:4466" # write
      - "4467:4467" # read
    volumes:
      - ./auth/keto/keto.yml:/etc/config/keto.yml:ro

  kratos-db:
    image: postgres:17-alpine
    container_name: edduhub-kratos-postgres
    environment:
      POSTGRES_USER: kratos
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: kratos
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kratos -d kratos"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - edduhub-kratos-data:/var/lib/postgresql/data

  kratos:
    image: oryd/kratos:v1.0.0
    container_name: edduhub-kratos
    depends_on:
      kratos-db:
        condition: service_healthy
    environment:
      - DSN=postgres://kratos:secret@kratos-db:5432/kratos?sslmode=disable
    command: serve -c /etc/config/kratos.yml --dev
    ports:
      - "4433:4433"
      - "4434:4434"
    volumes:
      - ./build/kratos.yml/kratos.yml:/etc/config/kratos.yml:ro
      - ./build/identity.schema.json/identity.schema.json:/etc/config/identity.schema.json:ro

  # Ory Hydra Database
  hydra-db:
    image: postgres:17-alpine
    container_name: edduhub-hydra-postgres
    environment:
      POSTGRES_USER: hydra
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: hydra
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hydra -d hydra"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - edduhub-hydra-data:/var/lib/postgresql/data

  # Ory Hydra OAuth2 Server
  hydra:
    image: oryd/hydra:v1.11.8
    container_name: edduhub-hydra
    depends_on:
      hydra-db:
        condition: service_healthy
    environment:
      - DSN=postgres://hydra:secret@hydra-db:5432/hydra?sslmode=disable
      - SECRETS_SYSTEM=your-32-character-secret-here123456
      - URLS_SELF_ISSUER=http://localhost:4444
      - URLS_CONSENT=http://localhost:3000/oauth2/consent
      - URLS_LOGIN=http://localhost:3000/oauth2/login
      - URLS_LOGOUT=http://localhost:3000/oauth2/logout
      - OIDC_SUBJECT_TYPES_SUPPORTED=public
      - OIDC_SUBJECT_TYPE_PAIRWISE=SECRET_SALT
    entrypoint: []
    command: ["sh", "-c", "hydra migrate sql --yes postgres://hydra:secret@hydra-db:5432/hydra?sslmode=disable && hydra serve all --dangerous-force-http"]
    ports:
      - "4444:4444"
      - "4445:4445"
    restart: unless-stopped

volumes:
  edduhub-postgres-data:
  edduhub-minio-data:
  edduhub-kratos-data:
  edduhub-hydra-data:
