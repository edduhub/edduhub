
services:
  test-db:
    image: postgres:16
    container_name: edduhub-test-db
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: testdb
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d testdb"]
      interval: 2s
      timeout: 5s
      retries: 10
    volumes:
      - test-db-data:/var/lib/postgresql/data

volumes:
  test-db-data: