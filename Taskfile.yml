version: '3'

vars:
  APP_NAME: edduhub
  GOLANGCI_LINT_VERSION: v1.64.8
  DEMO_SERVER_PORT: "8180"
  DEMO_CLIENT_PORT: "3100"
  DEMO_CLIENT_DIST_DIR: ".next-demo"
  VERIFY_CLIENT_DIST_DIR: ".next-verify"
  TEST_DATABASE_URL: postgres://testuser:testpass@localhost:5433/testdb?sslmode=disable
  TEST_DB_URL: "{{.TEST_DATABASE_URL}}"
  COVERAGE_UNIT_OUT: coverage-unit.out
  COVERAGE_INTEGRATION_OUT: coverage-integration.out
  COVERAGE_MERGED_OUT: coverage-merged.out
  COVERAGE_HTML_OUT: coverage.html
  MIGRATE_PATH: server/db/migrations


tasks:
  default:
    desc: Run all tests (unit and integration)
    cmds:
      - task: test

  test:
    desc: Run both unit and integration tests
    deps: [test:unit, test:integration]

  test:unit:
    desc: Run unit tests
    cmds:
      - go test -tags=unit -race -coverprofile={{.COVERAGE_UNIT_OUT}} ./...

  test:integration:
    desc: Run integration tests (requires Docker running)
    cmds:
      - task: test:integration:bootstrap

  test:integration:bootstrap:
    desc: Start required services and run integration suite
    cmds:
      - task: test:services:start
      - TEST_DATABASE_URL="{{.TEST_DATABASE_URL}}" task migrate:up
      - go test -tags=integration -race -coverprofile={{.COVERAGE_INTEGRATION_OUT}} -v ./...

  cover:
    desc: Generate and view code coverage report (run after tests)
    deps: [cover:merge]
    cmds:
      - go tool cover -html={{.COVERAGE_MERGED_OUT}}
    silent: true

  cover:merge:
    desc: Merge unit and integration test coverage profiles
    cmds:
      - |
        if [ -f {{.COVERAGE_UNIT_OUT}} ] && [ -f {{.COVERAGE_INTEGRATION_OUT}} ]; then
          gocovmerge {{.COVERAGE_UNIT_OUT}} {{.COVERAGE_INTEGRATION_OUT}} > {{.COVERAGE_MERGED_OUT}}
        elif [ -f {{.COVERAGE_UNIT_OUT}} ]; then
          cp {{.COVERAGE_UNIT_OUT}} {{.COVERAGE_MERGED_OUT}}
        elif [ -f {{.COVERAGE_INTEGRATION_OUT}} ]; then
          cp {{.COVERAGE_INTEGRATION_OUT}} {{.COVERAGE_MERGED_OUT}}
        else
          echo "No coverage files found to merge."
          exit 1
        fi
      - echo "Coverage merged into {{.COVERAGE_MERGED_OUT}}"

  lint:
    desc: Run golangci-lint
    cmds:
      - go run github.com/golangci/golangci-lint/cmd/golangci-lint@{{.GOLANGCI_LINT_VERSION}} run ./...

  tidy:
    desc: Run go mod tidy
    cmds:
      - go mod tidy -v

  build:
    desc: Build the main application binary
    cmds:
      - go build -o bin/{{.APP_NAME}} ./server

  clean:
    desc: Remove coverage files and built binary
    cmds:
      - rm -f {{.COVERAGE_UNIT_OUT}} {{.COVERAGE_INTEGRATION_OUT}} {{.COVERAGE_MERGED_OUT}} {{.COVERAGE_HTML_OUT}}
      - rm -f bin/{{.APP_NAME}}

  mocks:
    desc: Generate mocks for all interfaces using mockery
    cmds:
      - mockery 

  run:dev:
    desc: Run server with autoreload (requires air)
    cmds:
      - air

  docker:dev:
    desc: Start development environment with Docker Compose
    cmds:
      - docker-compose -f docker-compose.dev.yml up --build

  fmt:
    desc: Format code using gofumpt and goimports
    cmds:
      - gofumpt -w .
      - goimports -w .

  swagger:
    desc: Generate Swagger OpenAPI docs (requires swag)
    cmds:
      - swag init -g server/main.go -o server/docs

  migrate:up:
    desc: "Apply database migrations to the configured database URL"
    cmds:
      - |
        DATABASE_URL="${TEST_DATABASE_URL:-{{.TEST_DB_URL}}}"
        migrate -path {{.MIGRATE_PATH}} -database "$DATABASE_URL" up

  # ==============================================================================
  # BOOTSTRAP & SETUP TASKS
  # ==============================================================================

  check:env:
    desc: Check if required environment variables are set
    cmds:
      - |
        echo "Checking environment configuration..."
        if [ ! -f .env ] && [ ! -f server/.env.local ]; then
          echo "❌ Missing root .env and server/.env.local"
          echo "   Run: cp server/.env.example server/.env.local && edit it, or create a root .env"
          exit 1
        fi
        echo "✓ Server environment file found"
        
        if [ ! -f client/.env.local ]; then
          echo "⚠ Missing client/.env.local (creating from example)"
          cp client/.env.example client/.env.local
        fi
        echo "✓ client/.env.local found"

  check:deps:
    desc: Check if required tools are installed
    cmds:
      - |
        echo "Checking required tools..."
        
        tools="go docker docker-compose node npm migrate"
        missing=""
        
        for tool in $tools; do
          if ! command -v $tool &> /dev/null; then
            missing="$missing $tool"
          else
            version=$($tool --version 2>&1 | head -n 1)
            echo "✓ $tool: $version"
          fi
        done
        
        if [ ! -z "$missing" ]; then
          echo "❌ Missing tools:$missing"
          exit 1
        fi
        echo "✓ All required tools found"

  setup:server:
    desc: Setup server environment (install deps, create .env)
    cmds:
      - task: check:env
      - |
        echo "Setting up server dependencies..."
        go mod download
        go mod tidy
        echo "✓ Server dependencies ready"

  setup:client:
    desc: Setup client environment (install node dependencies)
    cmds:
      - |
        echo "Setting up client dependencies..."
        cd client
        npm install
        npm run typecheck
        cd ..
        echo "✓ Client dependencies ready"

  db:start:
    desc: Start database services (Docker Compose)
    cmds:
      - |
        echo "Starting database services..."
        docker-compose -f docker-compose.dev.yml up -d postgres redis minio keto kratos-db kratos
        echo "Waiting for services to be healthy..."
        sleep 5
        docker-compose -f docker-compose.dev.yml exec -T postgres pg_isready -U keto || echo "⚠ PostgreSQL not ready yet"
        echo "✓ Database services started"

  test:services:start:
    desc: Start test-only services for integration suite
    cmds:
      - |
        echo "Starting integration services..."
        docker-compose -f docker-compose.yml -f docker-compose.dev.yml up -d test-db redis kratos-db kratos keto
        echo "Waiting for integration services..."
        for _ in $(seq 1 60); do
          if pg_isready -h localhost -p 5433 -U testuser -d testdb >/dev/null 2>&1 && \
             docker-compose -f docker-compose.dev.yml exec -T redis redis-cli ping | grep -q PONG && \
             curl -fsS "http://127.0.0.1:4433/health/alive" >/dev/null 2>&1 && \
             curl -fsS "http://127.0.0.1:4467/health/alive" >/dev/null 2>&1; then
            echo "Integration services are ready."
            exit 0
          fi
          sleep 2
        done
        echo "Timed out waiting for integration services." >&2
        exit 1

  test:services:stop:
    desc: Stop integration test services
    cmds:
      - docker-compose -f docker-compose.yml -f docker-compose.dev.yml down

  db:stop:
    desc: Stop database services
    cmds:
      - docker-compose -f docker-compose.dev.yml down

  db:migrate:
    desc: Run all database migrations
    cmds:
      - |
        if [ -n "${TEST_DATABASE_URL:-}" ]; then
          DB_URL="${TEST_DATABASE_URL}"
        else
          DB_URL="postgres://$(grep '^DB_USER=' server/.env.local | cut -d= -f2):$(grep '^DB_PASSWORD=' server/.env.local | cut -d= -f2)@localhost:$(grep '^DB_PORT=' server/.env.local | cut -d= -f2)/$(grep '^DB_NAME=' server/.env.local | cut -d= -f2)?sslmode=disable"
        fi
        echo "Running migrations..."
        migrate -path {{.MIGRATE_PATH}} -database "$DB_URL" up
        echo "✓ Database migrations completed"

  db:migration-status:
    desc: Verify the local database is at the latest migration
    cmds:
      - |
        set -euo pipefail
        LATEST=$(find {{.MIGRATE_PATH}} -name '*.up.sql' -print | sed 's#.*/##' | cut -d_ -f1 | sort | tail -n 1 | sed 's/^0*//')
        CURRENT=$(docker-compose -f docker-compose.dev.yml exec -T postgres psql -U "$(grep '^DB_USER=' server/.env.local | cut -d= -f2)" -d "$(grep '^DB_NAME=' server/.env.local | cut -d= -f2)" -Atc "select version::text || case when dirty then '-dirty' else '' end from schema_migrations limit 1;" | sed 's/^0*//')
        if [ "$CURRENT" != "$LATEST" ]; then
          echo "❌ Database migration status mismatch. Current: $CURRENT, Latest: $LATEST"
          exit 1
        fi
        echo "✓ Database migrations are at version $CURRENT"

  db:seed-demo:
    desc: Seed deterministic demo data across visible modules
    cmds:
      - |
        echo "Seeding demo data..."
        go run ./server/cmd/demo_seed --seed-only
        echo "Verifying seeded demo logins..."
        go run ./server/cmd/demo_seed --verify-only
        echo "✓ Demo data seeded and verified"

  db:reset:
    desc: Reset database (WARNING - drops all data)
    cmds:
      - |
        DB_URL="postgres://$(grep '^DB_USER=' server/.env.local | cut -d= -f2):$(grep '^DB_PASSWORD=' server/.env.local | cut -d= -f2)@localhost:$(grep '^DB_PORT=' server/.env.local | cut -d= -f2)/$(grep '^DB_NAME=' server/.env.local | cut -d= -f2)?sslmode=disable"
        echo "⚠ WARNING: This will delete all data in the database"
        read -p "Are you sure? (type 'yes' to confirm): " confirm
        if [ "$confirm" = "yes" ]; then
          migrate -path {{.MIGRATE_PATH}} -database "$DB_URL" down
          migrate -path {{.MIGRATE_PATH}} -database "$DB_URL" up
          echo "✓ Database reset completed"
        else
          echo "Cancelled"
        fi

  bootstrap:
    desc: Full bootstrap setup (deps, env, db, migrations)
    cmds:
      - echo "🚀 Starting full bootstrap setup..."
      - task: check:deps
      - task: check:env
      - task: setup:server
      - task: setup:client
      - task: db:start
      - task: db:migrate
      - echo "✅ Bootstrap complete! Run 'task dev' to start development"

  dev:
    desc: Start full development environment (server + client)
    cmds:
      - |
        echo "Starting development environment..."
        echo "Backend: http://localhost:8080"
        echo "Frontend: http://localhost:3000"
        echo "Swagger: http://localhost:8080/swagger/index.html"
        echo ""
        echo "Press Ctrl+C to stop both services"
        sleep 2
      - |
        (task run:dev) & (cd client && npm run dev)
        wait
    
  dev:server:
    desc: Start server only with hot reload
    cmds:
      - task: run:dev

  dev:client:
    desc: Start client only
    cmds:
      - cd client && npm run dev

  demo:smoke:
    desc: Run the role-aware Playwright demo smoke suite against local built apps
    cmds:
      - |
        set -euo pipefail
        if lsof -t -iTCP:{{.DEMO_SERVER_PORT}} -sTCP:LISTEN >/dev/null 2>&1; then
          echo "❌ Demo server port {{.DEMO_SERVER_PORT}} is already in use."
          exit 1
        fi
        if lsof -t -iTCP:{{.DEMO_CLIENT_PORT}} -sTCP:LISTEN >/dev/null 2>&1; then
          echo "❌ Demo client port {{.DEMO_CLIENT_PORT}} is already in use."
          exit 1
        fi

        SERVER_LOG=$(mktemp)
        CLIENT_LOG=$(mktemp)
        cleanup() {
          EXIT_CODE=$?
          for PID in ${CLIENT_PID:-} ${SERVER_PID:-}; do
            if [ -n "$PID" ] && kill -0 "$PID" 2>/dev/null; then
              kill "$PID" 2>/dev/null || true
            fi
          done
          for PID in ${CLIENT_PID:-} ${SERVER_PID:-}; do
            if [ -z "$PID" ]; then
              continue
            fi
            for _ in $(seq 1 10); do
              if ! kill -0 "$PID" 2>/dev/null; then
                break
              fi
              sleep 1
            done
            if kill -0 "$PID" 2>/dev/null; then
              kill -9 "$PID" 2>/dev/null || true
            fi
            wait "$PID" 2>/dev/null || true
          done
          exit "$EXIT_CODE"
        }
        trap cleanup EXIT

        DEMO_API_URL="http://127.0.0.1:{{.DEMO_SERVER_PORT}}"
        DEMO_APP_URL="http://127.0.0.1:{{.DEMO_CLIENT_PORT}}"

        if ! (
          cd client
          NEXT_DIST_DIR="{{.DEMO_CLIENT_DIST_DIR}}" NEXT_PUBLIC_API_URL="$DEMO_API_URL" npm run build
        ) >"$CLIENT_LOG" 2>&1; then
          echo "❌ Client build failed"
          cat "$CLIENT_LOG"
          exit 1
        fi

        APP_PORT={{.DEMO_SERVER_PORT}} CORS_ORIGINS="$DEMO_APP_URL" ./bin/{{.APP_NAME}} >"$SERVER_LOG" 2>&1 &
        SERVER_PID=$!
        (
          cd client
          exec env NEXT_DIST_DIR="{{.DEMO_CLIENT_DIST_DIR}}" NEXT_PUBLIC_API_URL="$DEMO_API_URL" npm run start -- --hostname 127.0.0.1 --port {{.DEMO_CLIENT_PORT}}
        ) >>"$CLIENT_LOG" 2>&1 &
        CLIENT_PID=$!

        for _ in $(seq 1 60); do
          if curl -fsS "$DEMO_API_URL/health" >/dev/null; then
            break
          fi
          sleep 1
        done
        if ! curl -fsS "$DEMO_API_URL/health" >/dev/null; then
          echo "❌ Server failed to start"
          cat "$SERVER_LOG"
          exit 1
        fi

        for _ in $(seq 1 60); do
          if curl -fsS "$DEMO_APP_URL" >/dev/null; then
            break
          fi
          sleep 1
        done
        if ! curl -fsS "$DEMO_APP_URL" >/dev/null; then
          echo "❌ Client failed to start"
          cat "$CLIENT_LOG"
          exit 1
        fi

        cd client
        npx playwright install chromium
        NEXT_PUBLIC_API_URL="$DEMO_API_URL" PLAYWRIGHT_BASE_URL="$DEMO_APP_URL" npm run test:e2e:demo

  verify:demo:
    desc: Run the full local demo-readiness verification flow
    cmds:
      - task: db:start
      - task: build
      - task: test:unit
      - task: lint
      - cd client && npm run typecheck
      - cd client && npm run lint
      - cd client && NEXT_DIST_DIR="{{.VERIFY_CLIENT_DIST_DIR}}" npm run build
      - cd client && npm test -- --runInBand
      - task: db:migration-status
      - task: db:seed-demo
      - task: demo:smoke

  health:
    desc: Check health of running services
    cmds:
      - |
        echo "Checking service health..."
        echo ""
        
        echo "Backend API:"
        curl -s http://localhost:8080/health -I | head -n 1 || echo "❌ Backend not responding"

        echo ""
        echo "Backend readiness:"
        curl -s http://localhost:8080/ready -I | head -n 1 || echo "⚠ Readiness endpoint not responding"

        echo ""
        echo "Backend liveness:"
        curl -s http://localhost:8080/alive -I | head -n 1 || echo "⚠ Liveness endpoint not responding"
        
        echo ""
        echo "Frontend:"
        curl -s http://localhost:3000 -I | head -n 1 || echo "⚠ Frontend not responding"
        
        echo ""
        echo "Database:"
        docker-compose -f docker-compose.dev.yml exec -T postgres pg_isready -U keto || echo "❌ Database not responding"
        
        echo ""
        echo "Redis:"
        docker-compose -f docker-compose.dev.yml exec -T redis redis-cli ping || echo "❌ Redis not responding"
